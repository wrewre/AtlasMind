server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA catch-all (must be last) ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── SSE streaming — must come BEFORE the generic /api/ block ─
    # nginx uses longest-prefix match, so this more-specific path wins.
    location ~* ^/api/v1/documents/[^/]+/stream$ {
        proxy_pass         http://api-gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection '';     # keep-alive for SSE
        proxy_buffering    off;               # send events immediately
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Tell any intermediate proxy not to buffer
        add_header         X-Accel-Buffering no;
    }

    # ── WebSocket ─────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://api-gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 600s;
    }

    # ── All other API calls ───────────────────────────────────────
    location /api/ {
        proxy_pass             http://api-gateway:8000;
        proxy_set_header       Host        $host;
        proxy_set_header       X-Real-IP   $remote_addr;
        proxy_read_timeout     300s;
        client_max_body_size   25m;   # allow up to 25 MB uploads
    }

    # ── Compression ───────────────────────────────────────────────
    gzip            on;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml+rss image/svg+xml;
}
